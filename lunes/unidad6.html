<!DOCTYPE html> <!--  Ls etiqueta inicial que indica que tipo de documento es,,, que este caso es HTML5-->
<html>

<head>

            color: purple;

        #cuadrado {

<body>

        <input type="button" id="cambiarTexto" value="Cambiar Texto">

    <main>
        <form id="formLogin">
            <label>Usuario:</label>
            <input type="text" id="username">

            <li>Juan Perez</li>
        </ul>
        <img src="./img/images.jpg"><button id="cambiarImagen">Cambiar Imagen</button>

        <div id="cuadrado">

        </div>
        <div class="botones">
            <button type="button" id="desaparecer">Desaparecer</button>
            <button type="button" id="aparecer">Aparecer</button>
            <button type="button" id="agrandar">Agrandar</button>
            <button type="button" id="disminuir">Disminuir</button>
            <button type="button" id="cambiarColor">Cambiar Color</button>
        </div>
        <div>

            <form id="formTareas">
                <label>Tarea:<span id="mensaje">*campo requerido</span></label>
                <input type="text" id="tarea">
                <input type="submit" value="Agregar Tarea">
            </form>
            <ul id="listaTareas">
            </ul>
        </div>
    </main>
    <footer>

    </footer>



</body>

</html>
